name: Collect BOB Rates
on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/collect.js
        env:
          DBB_API_KEY: ${{ secrets.DBB_API_KEY }}
      - name: Commit changes
        run: |
          git config user.name "bob-rates-bot"
          git config user.email "actions@github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Actualiza cotizaciones $(date -u +%Y-%m-%dT%H:%M)"
          git push